spring:
  application:
    name: salome-core
  main:
    web-application-type: ${SALOME_WEB_APPLICATION_TYPE:servlet}
  profiles:
    default: local
  web:
    resources:
      cache:
        cachecontrol:
          no-cache: true
  servlet:
    multipart:
      max-file-size: ${SALOME_TORRE_FOTOS_MAX:10MB}
      max-request-size: ${SALOME_TORRE_FOTOS_MAX:10MB}

server:
  port: ${SALOME_SERVER_PORT:8787}

salome:
  legacy:
    datasource:
      enabled: ${SALOME_LEGACY_DB_ENABLED:false}
      url: ${SALOME_LEGACY_DB_URL:}
      username: ${SALOME_LEGACY_DB_USERNAME:}
      password: ${SALOME_LEGACY_DB_PASSWORD:}
      read-only: true
  manifesto:
    export:
      enabled: ${SALOME_MANIFESTO_EXPORT_ENABLED:false}
      cron: ${SALOME_MANIFESTO_EXPORT_CRON:0 */15 * * * *}
      spreadsheet-id: ${SALOME_MANIFESTO_EXPORT_SPREADSHEET_ID:}
      credentials-path: ${SALOME_MANIFESTO_EXPORT_CREDENTIALS_PATH:}
      filial-destino-id: ${SALOME_MANIFESTO_EXPORT_FILIAL_DESTINO_ID:}
      batch-size: ${SALOME_MANIFESTO_EXPORT_BATCH_SIZE:500}
      data-corte: ${SALOME_MANIFESTO_EXPORT_DATA_CORTE:2026-05-01}
  torre:
    enabled: ${SALOME_TORRE_ENABLED:false}
    sync:
      cron: ${SALOME_TORRE_SYNC_CRON:0 */5 * * * *}
    jwt:
      secret: ${SALOME_TORRE_JWT_SECRET:}
      expiration-minutes: ${SALOME_TORRE_JWT_EXP_MIN:720}
    fotos:
      dir: ${SALOME_TORRE_FOTOS_DIR:./dados/torre/fotos}
    mapa:
      # Mapa do armazém: janela (baixas de N dias atrás p/ frente) e cache curto
      # por filial, p/ não multiplicar as consultas pesadas no legado.
      dias-corte: ${SALOME_TORRE_MAPA_DIAS_CORTE:30}
      cache-segundos: ${SALOME_TORRE_MAPA_CACHE_SEGUNDOS:25}
    aguardando:
      # Veículos aguardando descarga (transferências): piso fixo = virada de produção.
      # Baixados a partir desta data ficam no painel até a descarga ser registrada na
      # Torre; baixas anteriores (backlog do legado) são ignoradas. Coletas usam só o dia.
      data-inicio: ${SALOME_TORRE_AGUARDANDO_DATA_INICIO:2026-07-01}
    datasource:
      url: ${SALOME_TORRE_DB_URL:}
      username: ${SALOME_TORRE_DB_USERNAME:}
      password: ${SALOME_TORRE_DB_PASSWORD:}
